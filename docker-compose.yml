services:
  mysql:
    image: mysql:8.4
    container_name: mdg-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: multisource_data_generator
    ports:
      - "3306:3306"
    volumes:
      - mdg_mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  postgres:
    image: postgres:16
    container_name: mdg-postgres
    environment:
      POSTGRES_DB: demo_sink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mdg_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mdg-sqlserver
    profiles: ["sqlserver"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MDG_SQLSERVER_SA_PASSWORD:-MdgSqlServer123!}
    ports:
      - "1433:1433"
    volumes:
      - mdg_sqlserver_data:/var/opt/mssql
      - ./infra/sqlserver/init:/work/init:ro
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: mdg-oracle
    profiles: ["oracle"]
    environment:
      ORACLE_PWD: ${MDG_ORACLE_SYS_PASSWORD:-MdgOracle123!}
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - mdg_oracle_data:/opt/oracle/oradata
      - ./infra/oracle/setup:/opt/oracle/scripts/setup:ro
      - ./infra/oracle/setup:/opt/oracle/scripts/startup:ro

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.15
    container_name: mdg-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:9092
    ports:
      - "9092:19092"
      - "9644:9644"

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.15
    depends_on:
      - redpanda
    entrypoint:
      - /bin/sh
      - -c
      - |
        until rpk cluster info --brokers redpanda:9092 >/dev/null 2>&1; do
          sleep 2
        done
        rpk topic create synthetic.user.activity --brokers redpanda:9092 || true

  http-echo:
    image: ealen/echo-server:0.9.2
    container_name: mdg-http-echo
    ports:
      - "9000:80"

  backend:
    build:
      context: ./backend
    depends_on:
      - mysql
      - postgres
      - redpanda
      - http-echo
    environment:
      APP_DATASOURCE_URL: jdbc:mysql://mysql:3306/multisource_data_generator?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      APP_DATASOURCE_USERNAME: root
      APP_DATASOURCE_PASSWORD: 123456
      MDG_SECURITY_ENABLED: "true"
      MDG_SECURITY_USERNAME: ${MDG_SECURITY_USERNAME:-admin}
      MDG_SECURITY_PASSWORD: ${MDG_SECURITY_PASSWORD:-123456}
      MDG_SECRET_KEY: ${MDG_SECRET_KEY:-local-dev-secret-change-me}
      MDG_QUICKSTART_HTTP_BASE_URL: http://http-echo
      MDG_QUICKSTART_MYSQL_JDBC_URL: jdbc:mysql://mysql:3306/demo_sink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      MDG_QUICKSTART_POSTGRESQL_JDBC_URL: jdbc:postgresql://postgres:5432/demo_sink
      MDG_QUICKSTART_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8888:8888"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mdg_mysql_data:
  mdg_postgres_data:
  mdg_sqlserver_data:
  mdg_oracle_data:
